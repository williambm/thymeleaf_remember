<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/header :: head}"></head>
<body>
<div th:replace="~{fragmentos/header :: header}"></div>
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h2 class="mb-4" style="color:#0000cc;">Área do Docente</h2>
            <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
            <form th:action="@{/docente/login}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="usuario">Usuário</label>
                    <input type="text" class="form-control" id="usuario" name="usuario" required autocomplete="username"/>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="senha">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha" required autocomplete="current-password"/>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" style="background-color:#0000CC;">Entrar</button>
                    <a class="btn btn-outline-secondary" th:href="@{/}">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
