<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/header :: head}"></head>
<body>
<div th:replace="~{fragmentos/header :: header}"></div>
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <h2 class="mb-4" style="color:#0000cc;">Consultar Status da Inscrição</h2>
            <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
            <form th:action="@{/status}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="emailStatus">Informe o e-mail utilizado na inscrição</label>
                    <input type="email" class="form-control" id="emailStatus" name="email" required maxlength="100"/>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" style="background-color:#0000CC;">Consultar</button>
                    <a class="btn btn-outline-secondary" th:href="@{/}">Voltar</a>
                </div>
            </form>
            <div th:if="${inscricao}" class="mt-4">
                <h5>Dados da inscrição:</h5>
                <ul class="list-group">
                    <li class="list-group-item"><strong>Nome:</strong> <span th:text="${inscricao.nome}"></span></li>
                    <li class="list-group-item"><strong>E-mail:</strong> <span th:text="${inscricao.email}"></span></li>
                    <li class="list-group-item"><strong>Área de formação:</strong> <span th:text="${inscricao.areaFormacao.label}"></span></li>
                    <li class="list-group-item">
                        <strong>Status:</strong>
                        <span th:classappend="
                            ${inscricao.status.name() == 'PENDENTE'} ? 'badge bg-warning text-dark' :
                            (${inscricao.status.name() == 'DEFERIDA'} ? 'badge bg-success' : 'badge bg-danger')"
                            th:text="${inscricao.status}">
                        </span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragmentos/footer :: footer}"></div>
</body>
</html>
